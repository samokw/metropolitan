name: Load test

on:
  workflow_dispatch:
    inputs:
      script:
        description: "k6 script to run"
        type: choice
        required: true
        default: api-load
        options:
          - api-load
          - housing-all
          - housing-aggregates
          - labour-aggregates
          - home
      base_url:
        description: "Base URL to test"
        required: true
        default: "https://metropolitan.foundre.app"

permissions:
  contents: read

jobs:
  load-test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Run k6 load test
        env:
          BASE_URL: ${{ inputs.base_url }}
        run: k6 run test/load/${{ inputs.script }}.js
